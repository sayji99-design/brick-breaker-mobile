<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>모바일 벽돌깨기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone-frame">
    <section class="game-card">
      <header class="top-bar">
        <div>
          <p class="eyebrow">MOBILE ARCADE</p>
          <h1>통통 벽돌깨기</h1>
        </div>
        <button id="soundBtn" class="icon-btn" aria-label="소리 켜기 끄기">🔊</button>
      </header>

      <div class="score-board">
        <div><span>점수</span><strong id="score">0</strong></div>
        <div><span>목숨</span><strong id="lives">3</strong></div>
        <div><span>단계</span><strong id="level">1</strong></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="520"></canvas>
        <div id="overlay" class="overlay">
          <h2>벽돌을 모두 깨보세요!</h2>
          <p>화면을 드래그하거나 아래 버튼으로 막대를 움직이세요.</p>
          <button id="startBtn" class="primary-btn">게임 시작</button>
        </div>
      </div>

      <div class="controls">
        <button id="leftBtn" class="control-btn">◀</button>
        <button id="pauseBtn" class="pause-btn">일시정지</button>
        <button id="rightBtn" class="control-btn">▶</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
